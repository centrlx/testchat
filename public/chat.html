<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>testchat. | Чат</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,500,0,0"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="chat-body">
    <main class="messenger-layout">
      <aside class="chat-sidebar">
        <div class="chat-list">
          <article class="chat-card chat-card--active">
            <div class="chat-card__content">
              <p id="current-user"></p>
            </div>
          </article>
        </div>

        <button class="ghost-button sidebar-button" id="logout-button" type="button">
          <span class="material-symbols-outlined">logout</span>
          Выйти
        </button>
      </aside>

      <section class="chat-main">

        <section class="messages" id="messages"></section>

        <form class="composer" id="message-form">
          <label class="composer-input">
            <span class="material-symbols-outlined">chat</span>
            <input
              id="message-input"
              name="text"
              type="text"
              maxlength="1000"
              placeholder="Сообщение"
              autocomplete="off"
              required
            />
          </label>

          <button class="primary-button primary-button--round" type="submit" aria-label="Отправить">
            <span class="material-symbols-outlined">send</span>
          </button>
        </form>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
